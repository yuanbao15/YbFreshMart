server:
  port: 8082

spring:
  application:
    name: yb-user
  profiles:
    active: dev
  # MySQL 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/yb_user?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Nacos
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace:
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        refresh-enabled: true
        import-check:
          enabled: false        # 学习阶段关闭，直接使用本地 application.yml

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id         # 雪花算法
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL
    map-underscore-to-camel-case: true

# Swagger / Knife4j
swagger:
  title: yb-user - 用户服务
  description: 用户信息管理 & 收货地址接口文档
  version: 1.0.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html           # 原生 Swagger UI 路径
  api-docs:
    path: /v3/api-docs               # OpenAPI JSON 路径
  group-configs:
    - group: default
      paths-to-match: "/**"

# Knife4j 增强
knife4j:
  enable: true
  setting:
    language: zh_cn                  # 中文界面

# 日志
logging:
  level:
    com.yb: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
