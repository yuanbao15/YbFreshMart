server:
  port: 8083

spring:
  application:
    name: yb-product
  profiles:
    active: dev
  # MySQL 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/yb_product?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
  # Nacos
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace:
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        refresh-enabled: true
        import-check:
          enabled: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# Swagger / Knife4j
swagger:
  title: yb-product - 商品服务
  description: 类目、SPU、SKU 管理接口文档
  version: 1.0.0

springdoc:
  enable-spring-data-rest-support: false
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: "/**"

knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志
logging:
  level:
    com.yb: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
