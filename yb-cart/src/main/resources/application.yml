server:
  port: 8085

spring:
  application:
    name: yb-cart
  profiles:
    active: dev
  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
  # Nacos
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace:
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        refresh-enabled: true
        import-check:
          enabled: false

# Swagger / Knife4j
swagger:
  title: yb-cart - 购物车服务
  description: Redis 购物车管理接口文档
  version: 1.0.0

springdoc:
  enable-spring-data-rest-support: false
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: "/**"

knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志
logging:
  level:
    com.yb: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
